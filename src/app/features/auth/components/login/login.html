<div class="login-wrapper">
  <p-card header="Iniciar Sesión" subheader="Bienvenido a SquashApp" styleClass="login-card">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Correo Electrónico</label>
        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
          class="w-full"
          placeholder="tu@email.com"
        />

        <small
          class="p-error"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        >
          Por favor, introduce un email válido.
        </small>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          placeholder="********"
        >
        </p-password>
      </div>

      <div *ngIf="errorMessage" class="p-error server-error">
        <i class="pi pi-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <div class="submit-btn">
        <p-button
          label="Entrar"
          icon="pi pi-sign-in"
          type="submit"
          styleClass="w-full"
          [disabled]="loginForm.invalid"
        >
        </p-button>
      </div>
    </form>
  </p-card>
</div>
